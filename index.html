<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Welcome to our Full Stack Project - Browse cats with our responsive card grid">
    <title>Sydiepus' Lair | Home</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <a href="index.html" class="navbar-brand">Sydiepus' Lair</a>
        <ul class="navbar-nav">
            <li><a href="index.html" class="active">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="mission.html">Mission</a></li>
        </ul>
    </nav>

    <!-- Main Content -->
    <main class="main">
        <div class="container">
            <header class="page-header mb-4">
                <h1 class="page-heading">Cat Explorer</h1>
                <p class="lead">Browse our collection of adorable cats</p>
            </header>

            <!-- Search Form -->
            <form id="search-form" class="search-form mb-4">
                <div class="input-group">
                    <input 
                        type="search" 
                        id="search-input" 
                        class="form-control form-control-lg" 
                        placeholder="Search cats by name, breed, or description..." 
                        aria-label="Search cats"
                    >
                    <button class="btn btn-outline-secondary" type="button" id="clear-search" aria-label="Clear search">
                        <i class="bi bi-x-lg"></i>
                    </button>
                    <button class="btn btn-primary" type="submit">
                        <i class="bi bi-search"></i> Search
                    </button>
                </div>
            </form>

            <!-- Loading State -->
            <div id="loading" class="loading-overlay" style="display: none;">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <span class="loading-text">Loading cats...</span>
            </div>

            <!-- Error Message -->
            <div id="error-message" class="alert alert-danger" style="display: none;"></div>

            <!-- Empty State -->
            <div id="empty-message" class="alert alert-info" style="display: none;"></div>

            <!-- Card Grid (Dynamic) -->
            <section class="card-grid-section mb-5">
                <div id="cat-grid" class="row"></div>
            </section>

            <!-- Pagination Info -->
            <div id="pagination-info" class="pagination-info text-center mb-3"></div>

            <!-- Pagination -->
            <nav id="pagination" class="pagination-container mb-4"></nav>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p class="silly-text">&copy; 2026 Sydiepus' Lair. All noses reserved.</p>
        </div>
    </footer>

    <!-- API and Application Scripts -->
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <!-- Bootstrap 5 JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
</body>
</html>
